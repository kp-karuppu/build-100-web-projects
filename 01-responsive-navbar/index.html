<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header class="navbar">
        <div class="logo">
            Setflix
        </div>

        <ul class="links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Movies</a></li>
            <li><a href="#">TV Shows</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">My list</a></li>
        </ul>

        <div class="actions">
            <div class="nav-search">
                <input type="text" name="name-search" id="nav-search" placeholder="Search Movies / Tv Shows" required>
                <button class="nav-search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <button class="profile-btn"><i class="fa-solid fa-circle-user"></i></button>
        </div>

    </header>

    <section class="home">
        <div class="box">
            <h1>Setflix</h1>
            <p>Find your entertainment and relax yourself.</p>
            <div class="search">
                <input type="text" name="home-search" id="home-search">
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </section>
</body>

</html>
